name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package (no publish)
        run: |
          pnpm run build
          pnpm run package

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/**/*
  
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload mac assets
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-macos/holix-ai-0.0.1-mac-arm64.dmg
          asset_name: holix-ai-0.0.1-mac-arm64.dmg
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload mac blockmap
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-macos/holix-ai-0.0.1-arm64.dmg.blockmap
          asset_name: holix-ai-0.0.1-arm64.dmg.blockmap
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload mac latest
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-macos/latest-mac.yml
          asset_name: latest-mac.yml
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload win assets
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-windows/holix-ai-0.0.1.exe
          asset_name: holix-ai-0.0.1.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload win blockmap
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-windows/holix-ai-0.0.1.exe.blockmap
          asset_name: holix-ai-0.0.1.exe.blockmap
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload win latest
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-windows/latest.yml
          asset_name: latest.yml
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}
