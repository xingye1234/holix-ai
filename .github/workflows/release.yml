name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      # 2. 安装 Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3. 打包（不 publish）
      - name: Build and package
        run: |
          pnpm run build
          pnpm run release -- --publish never

      # 4. 上传 dist 作为 artifact
      - name: Determine artifact name
        id: artifact-name
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "name=dist-macos" >> $GITHUB_OUTPUT
          else
            echo "name=dist-windows" >> $GITHUB_OUTPUT
          fi

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: dist/**/*
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug list downloaded artifacts
        run: |
          echo "--- artifacts root ---"
          ls -la artifacts || true
          echo "--- recursive ---"
          find artifacts -maxdepth 3 -type f -print || true

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload mac assets
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-macos/holix-ai-0.0.1-mac-arm64.dmg
          asset_name: holix-ai-0.0.1-mac-arm64.dmg
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload mac blockmap
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-macos/holix-ai-0.0.1-arm64.dmg.blockmap
          asset_name: holix-ai-0.0.1-arm64.dmg.blockmap
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload mac latest
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-macos/latest-mac.yml
          asset_name: latest-mac.yml
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload win assets
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-windows/holix-ai-0.0.1.exe
          asset_name: holix-ai-0.0.1.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload win blockmap
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-windows/holix-ai-0.0.1.exe.blockmap
          asset_name: holix-ai-0.0.1.exe.blockmap
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}

      - name: Upload win latest
        if: ${{ always() }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/dist-windows/latest.yml
          asset_name: latest.yml
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}