name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      # 2. 安装 Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3. 打包（不 publish）
      - name: Build and package
        run: |
          pnpm run build
          pnpm run release -- --publish never

      # 4. 上传 dist 作为 artifact
      - name: Determine artifact name
        id: artifact-name
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "name=dist-macos" >> $GITHUB_OUTPUT
          else
            echo "name=dist-windows" >> $GITHUB_OUTPUT
          fi

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: dist/**/*
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug list downloaded artifacts
        run: |
          echo "--- artifacts root ---"
          ls -la artifacts || true
          echo "--- recursive ---"
          find artifacts -maxdepth 3 -type f -print || true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.HOLIX_RELEASE }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/dist-macos/**/holix-ai-*-arm64.dmg
            artifacts/dist-macos/**/holix-ai-*-arm64.dmg.blockmap
            artifacts/dist-macos/**/latest-mac.yml
            artifacts/dist-windows/**/holix-ai-setup-*-x64.exe
            artifacts/dist-windows/**/holix-ai-setup-*-x64.exe.blockmap
            artifacts/dist-windows/**/latest.yml
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.HOLIX_RELEASE }}
